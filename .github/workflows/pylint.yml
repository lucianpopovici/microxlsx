name: Pylint

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.8", "3.9", "3.10"]
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v3
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pylint
        pip install -e ".[test]"
    - name: Analysing the code with pylint
      run: |
        pylint src/microxlsx
        pylint tests --disable=missing-module-docstring,missing-class-docstring,missing-function-docstring,too-few-public-methods,too-many-lines,duplicate-code
    - name: Run tests
      run: pytest -q
